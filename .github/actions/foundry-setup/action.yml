name: "Foundry Setup"
description: "Install Foundry, cache dependencies, and run install-deps.sh"

inputs:
  talos-deploy-key:
    description: "SSH deploy key for the private @talos/client git dependency (oplabs/talos)"
    required: true

runs:
  using: "composite"
  steps:
    - name: Install Foundry
      uses: foundry-rs/foundry-toolchain@v1

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: contracts/dependencies/
        key: deps-${{ hashFiles('contracts/soldeer.lock', 'contracts/install-deps.sh') }}

    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10
        run_install: false

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: "pnpm"
        cache-dependency-path: contracts/pnpm-lock.yaml

    - name: Install dependencies
      shell: bash
      working-directory: contracts
      run: bash install-deps.sh

    - name: Set up SSH agent for @talos/client deploy key
      uses: webfactory/ssh-agent@a6f90b1f127823b31d4d4a8d96047790581349bd # v0.9.1
      with:
        ssh-private-key: ${{ inputs.talos-deploy-key }}

    - name: Configure Git auth for git dependencies
      shell: bash
      run: |
        # Public git deps (e.g. prompts) clone over HTTPS.
        git config --global url."https://github.com/".insteadOf "git@github.com:"
        # Keep the private @talos/client (oplabs/talos) on SSH so the deploy key
        # authenticates it — the longer prefix takes precedence over the rule above.
        git config --global url."git@github.com:oplabs/talos".insteadOf "git@github.com:oplabs/talos"

    - name: Install npm dependencies
      shell: bash
      working-directory: contracts
      run: pnpm install --frozen-lockfile

    - name: Cache forge build
      uses: actions/cache@v4
      with:
        path: |
          contracts/out/
          contracts/cache/solidity-files-cache.json
        key: forge-build-${{ hashFiles('contracts/**/*.sol', 'contracts/foundry.toml') }}
        restore-keys: forge-build-

    - name: Build all artifacts
      shell: bash
      working-directory: contracts
      run: forge build
