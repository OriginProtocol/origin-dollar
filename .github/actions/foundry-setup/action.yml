name: "Foundry Setup"
description: "Install Foundry, cache dependencies, and run install-deps.sh"

runs:
  using: "composite"
  steps:
    - name: Install Foundry
      uses: foundry-rs/foundry-toolchain@v1

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: contracts/dependencies/
        key: deps-${{ hashFiles('contracts/soldeer.lock', 'contracts/install-deps.sh') }}

    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10
        run_install: false

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: "pnpm"
        cache-dependency-path: contracts/pnpm-lock.yaml

    - name: Install dependencies
      shell: bash
      working-directory: contracts
      run: bash install-deps.sh

    - name: Configure Git for public dependencies
      shell: bash
      run: git config --global url."https://github.com/".insteadOf "git@github.com:"

    - name: Install npm dependencies
      shell: bash
      working-directory: contracts
      run: pnpm install --frozen-lockfile

    - name: Cache forge build
      uses: actions/cache@v4
      with:
        path: |
          contracts/out/
          contracts/cache/solidity-files-cache.json
        key: forge-build-${{ hashFiles('contracts/**/*.sol', 'contracts/foundry.toml') }}
        restore-keys: forge-build-

    - name: Build all artifacts
      shell: bash
      working-directory: contracts
      run: forge build
