    if: always() && (needs.build.result == 'success' || github.event_name == 'schedule')
    runs-on: ubuntu-latest
    env:
      MAINNET_PROVIDER_URL: ${{ secrets.PROVIDER_URL }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ./.github/actions/foundry-setup
      - name: Discover and run Mainnet smoke tests
        working-directory: contracts
        run: |
          DIRS=$(grep -rl "_createAndSelectForkMainnet" tests/smoke/ --include="Shared.t.sol" | \
            sed 's|/shared/Shared.t.sol||' | sort -u | tr '\n' ',' | sed 's/,$//')
