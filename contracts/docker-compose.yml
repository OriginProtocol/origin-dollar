services:
  actions:
    build:
      context: .
      dockerfile: dockerfile-actions
    ports:
      - "8080:8080"
    environment:
      - PROVIDER_URL=${PROVIDER_URL:-}
      - SONIC_PROVIDER_URL=${SONIC_PROVIDER_URL:-}
      - PLUME_PROVIDER_URL=${PLUME_PROVIDER_URL:-}
      - HOODI_PROVIDER_URL=${HOODI_PROVIDER_URL:-}
      - BEACON_PROVIDER_URL=${BEACON_PROVIDER_URL:-}
      - HARDHAT_NETWORK=${HARDHAT_NETWORK:-mainnet}
      - ACTION_API_BEARER_TOKEN=${ACTION_API_BEARER_TOKEN:-test-token}
      - LOKI_URL=${LOKI_URL:-}
      - LOKI_USER=${LOKI_USER:-}
      - LOKI_API_KEY=${LOKI_API_KEY:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - CRON_CONFIG_PATH=./cron/cron-jobs.json
      - CRON_OUTPUT_PATH=./cron/cronjob
      - DEBUG=origin*
