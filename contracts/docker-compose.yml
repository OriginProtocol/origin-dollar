services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nonce_queue
      POSTGRES_USER: nonce
      POSTGRES_PASSWORD: nonce
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nonce -d nonce_queue"]
      interval: 5s
      timeout: 3s
      retries: 5

  actions:
    build:
      context: .
      dockerfile: dockerfile-actions
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://nonce:nonce@postgres:5432/nonce_queue}
      - NONCE_QUEUE_LOCK_TIMEOUT_MS=${NONCE_QUEUE_LOCK_TIMEOUT_MS:-0}
      - PROVIDER_URL=${PROVIDER_URL:-}
      - SONIC_PROVIDER_URL=${SONIC_PROVIDER_URL:-}
      - PLUME_PROVIDER_URL=${PLUME_PROVIDER_URL:-}
      - HOODI_PROVIDER_URL=${HOODI_PROVIDER_URL:-}
      - BEACON_PROVIDER_URL=${BEACON_PROVIDER_URL:-}
      - HARDHAT_NETWORK=${HARDHAT_NETWORK:-mainnet}
      - ACTION_API_BEARER_TOKEN=${ACTION_API_BEARER_TOKEN:-test-token}
      - LOKI_URL=${LOKI_URL:-}
      - LOKI_USER=${LOKI_USER:-}
      - LOKI_API_KEY=${LOKI_API_KEY:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - CRON_OUTPUT_PATH=./cron/cronjob
      - DEBUG=origin*

volumes:
  pgdata:
