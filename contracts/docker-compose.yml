services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nonce_queue
      POSTGRES_USER: nonce
      POSTGRES_PASSWORD: nonce
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nonce -d nonce_queue"]
      interval: 5s
      timeout: 3s
      retries: 5

  actions:
    build:
      context: .
      dockerfile: dockerfile-actions
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://nonce:nonce@postgres:5432/nonce_queue}
      - NONCE_QUEUE_LOCK_TIMEOUT_S=${NONCE_QUEUE_LOCK_TIMEOUT_S:-0}
      - NONCE_QUEUE_TX_CONFIRM_TIMEOUT_S=${NONCE_QUEUE_TX_CONFIRM_TIMEOUT_S:-600}
      - NONCE_QUEUE_RECEIPT_POLL_S=${NONCE_QUEUE_RECEIPT_POLL_S:-5}
      - NONCE_QUEUE_REBROADCAST_INTERVAL_S=${NONCE_QUEUE_REBROADCAST_INTERVAL_S:-30}
      - NONCE_QUEUE_REPLACE_INTERVAL_S=${NONCE_QUEUE_REPLACE_INTERVAL_S:-90}
      - NONCE_QUEUE_MAX_REPLACEMENTS=${NONCE_QUEUE_MAX_REPLACEMENTS:-3}
      - NONCE_QUEUE_FEE_BUMP_PCT=${NONCE_QUEUE_FEE_BUMP_PCT:-15}
      - NONCE_QUEUE_GAS_LIMIT_BUFFER_PCT=${NONCE_QUEUE_GAS_LIMIT_BUFFER_PCT:-0}
      - NONCE_QUEUE_MAX_GAS_PRICE_GWEI_CHAIN_1=${NONCE_QUEUE_MAX_GAS_PRICE_GWEI_CHAIN_1:-40}
      - NONCE_QUEUE_MAX_GAS_PRICE_GWEI_CHAIN_8453=${NONCE_QUEUE_MAX_GAS_PRICE_GWEI_CHAIN_8453:-0}
      - NONCE_QUEUE_MAX_GAS_PRICE_GWEI_CHAIN_146=${NONCE_QUEUE_MAX_GAS_PRICE_GWEI_CHAIN_146:-0}
      - NONCE_QUEUE_MAX_GAS_PRICE_GWEI_CHAIN_560048=${NONCE_QUEUE_MAX_GAS_PRICE_GWEI_CHAIN_560048:-0}
      - NONCE_QUEUE_MAX_GAS_PRICE_GWEI_CHAIN_999=${NONCE_QUEUE_MAX_GAS_PRICE_GWEI_CHAIN_999:-0}
      - NONCE_QUEUE_MAX_GAS_PRICE_GWEI_CHAIN_17000=${NONCE_QUEUE_MAX_GAS_PRICE_GWEI_CHAIN_17000:-0}
      - NONCE_QUEUE_MAX_GAS_PRICE_GWEI_CHAIN_42161=${NONCE_QUEUE_MAX_GAS_PRICE_GWEI_CHAIN_42161:-0}
      - MAINNET_PROVIDER_URL=${MAINNET_PROVIDER_URL:-}
      - BASE_PROVIDER_URL=${BASE_PROVIDER_URL:-}
      - SONIC_PROVIDER_URL=${SONIC_PROVIDER_URL:-}
      - HOLESKY_PROVIDER_URL=${HOLESKY_PROVIDER_URL:-}
      - HOODI_PROVIDER_URL=${HOODI_PROVIDER_URL:-}
      - ARBITRUM_PROVIDER_URL=${ARBITRUM_PROVIDER_URL:-}
      - HYPEREVM_PROVIDER_URL=${HYPEREVM_PROVIDER_URL:-}
      - PLUME_PROVIDER_URL=${PLUME_PROVIDER_URL:-}
      - BEACON_PROVIDER_URL=${BEACON_PROVIDER_URL:-}
      - HARDHAT_NETWORK=${HARDHAT_NETWORK:-mainnet}
      - ACTION_API_BEARER_TOKEN=${ACTION_API_BEARER_TOKEN:-test-token}
      - RUNNER_BASE_URL=${RUNNER_BASE_URL:-http://origin-dollar:8080}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - DEBUG=origin*

volumes:
  pgdata:
